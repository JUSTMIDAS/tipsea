<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — TipSea Point</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    :root { --cyan:#00B4D8; --sand:#F8F4EE; --ocean:#0A1628; --gold:#F0C040; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'DM Sans',sans-serif;
      background:var(--ocean);
      color:var(--sand);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      text-align:center;
      padding:2rem;
      overflow:hidden;
    }

    /* Animated ocean floor */
    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 120%, rgba(0,180,216,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(44,120,115,0.05) 0%, transparent 60%);
      pointer-events:none;
    }

    .container { position:relative; z-index:1; max-width:600px; }

    .code {
      font-family:'Space Mono',monospace;
      font-size:0.65rem;
      letter-spacing:0.3em;
      text-transform:uppercase;
      color:rgba(0,180,216,0.6);
      margin-bottom:1rem;
    }

    .number {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(6rem,18vw,11rem);
      font-weight:300;
      line-height:1;
      color:rgba(248,244,238,0.06);
      letter-spacing:-0.02em;
      margin-bottom:-1rem;
      position:relative;
    }
    .number::after {
      content:'404';
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg, var(--cyan), var(--gold));
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
      opacity:0.25;
    }

    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1.8rem,5vw,2.8rem);
      font-weight:300;
      font-style:italic;
      color:var(--sand);
      margin-bottom:1rem;
      line-height:1.2;
    }

    p {
      font-size:0.95rem;
      line-height:1.75;
      color:rgba(248,244,238,0.5);
      max-width:420px;
      margin:0 auto 2.5rem;
    }

    .wave-line {
      width:60px; height:1px;
      background:linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin:1.5rem auto;
    }

    .links { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }

    .link-primary {
      background:var(--cyan); color:var(--ocean);
      border:none; padding:0.9rem 2rem;
      font-family:'DM Sans',sans-serif; font-size:0.75rem;
      font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; text-decoration:none; display:inline-block;
      transition:all 0.3s;
    }
    .link-primary:hover { background:#00d4f5; transform:translateY(-2px); }

    .link-ghost {
      background:transparent; color:rgba(248,244,238,0.6);
      border:1px solid rgba(248,244,238,0.2);
      padding:0.9rem 2rem;
      font-family:'DM Sans',sans-serif; font-size:0.75rem;
      font-weight:500; letter-spacing:0.12em; text-transform:uppercase;
      text-decoration:none; display:inline-block; transition:all 0.3s;
    }
    .link-ghost:hover { border-color:var(--cyan); color:var(--cyan); }

    .coord {
      font-family:'Space Mono',monospace;
      font-size:0.65rem;
      color:rgba(0,180,216,0.35);
      letter-spacing:0.15em;
      margin-top:3rem;
    }

    /* Floating particles */
    .particle {
      position:fixed;
      width:2px; height:2px;
      background:rgba(0,180,216,0.4);
      border-radius:50%;
      animation:float linear infinite;
      pointer-events:none;
    }
    @keyframes float {
      from { transform:translateY(100vh) translateX(0); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.3; }
      to   { transform:translateY(-10px) translateX(20px); opacity:0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="code">Error · 404</p>
    <div class="number">404</div>
    <h1>Lost at sea</h1>
    <div class="wave-line"></div>
    <p>The page you're looking for has drifted away with the tide. Let us navigate you back to calmer waters.</p>
    <div class="links">
      <a href="/" class="link-primary">← Back to TipSea Point</a>
      <a href="/#contact" class="link-ghost">Contact Us</a>
    </div>
    <p class="coord">26°33′N · 76°58′W · Elbow Cay, Abaco</p>
  </div>

  <script>
    // Spawn particles
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
      p.style.animationDuration = (Math.random() * 12 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      document.body.appendChild(p);
    }
  </script>
</body>
</html>
